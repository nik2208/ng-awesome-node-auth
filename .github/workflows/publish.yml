name: Publish to npm
on:
  push:
    branches:
      - main
    paths:
      - 'projects/ng-awesome-node-auth/package.json'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Publish to npm
        working-directory: ${{ github.workspace }}/dist/ng-awesome-node-auth
        run: npm publish --access public --provenance